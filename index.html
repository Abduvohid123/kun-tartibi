<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kun Tartibim</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/uz.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── DARK (default) ── */
  :root {
    --bg:        #0f172a;
    --bg2:       #1e293b;
    --bg3:       #263248;
    --border:    #334155;
    --border2:   #475569;
    --text:      #e2e8f0;
    --text2:     #94a3b8;
    --text3:     #64748b;
    --text4:     #475569;
    --timeline:  #1e3a5f;
    --inp-bg:    #0f172a;
    --dot-bg:    #1e3a5f;
    --time-hover:#1e3a5f;
  }
  /* ── LIGHT ── */
  body.light {
    --bg:        #f1f5f9;
    --bg2:       #ffffff;
    --bg3:       #f8fafc;
    --border:    #e2e8f0;
    --border2:   #cbd5e1;
    --text:      #0f172a;
    --text2:     #334155;
    --text3:     #64748b;
    --text4:     #94a3b8;
    --timeline:  #bfdbfe;
    --inp-bg:    #f8fafc;
    --dot-bg:    #bfdbfe;
    --time-hover:#eff6ff;
  }

  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 16px; transition: background 0.25s, color 0.25s; }
  .container { max-width: 680px; margin: 0 auto; }

  /* TABS */
  .tabs { display: flex; gap: 6px; margin-bottom: 16px; background: var(--bg2); border-radius: 12px; padding: 4px; border: 1px solid var(--border); }
  .tab-btn { flex: 1; padding: 9px; border: none; border-radius: 9px; font-size: 0.88rem; font-weight: 600; cursor: pointer; background: transparent; color: var(--text3); transition: all 0.2s; }
  .tab-btn.active { background: var(--border); color: var(--text); }
  .tab-btn:hover:not(.active) { color: var(--text2); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* THEME TOGGLE */
  .theme-toggle { background: var(--border); border: none; color: var(--text2); width: 36px; height: 36px; border-radius: 9px; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .theme-toggle:hover { background: var(--border2); color: var(--text); }

  /* NAV */
  .day-nav { display: flex; align-items: center; justify-content: space-between; background: var(--bg2); border-radius: 14px; padding: 12px 16px; margin-bottom: 14px; border: 1px solid var(--border); }
  .nav-btn { background: var(--border); border: none; color: var(--text2); width: 36px; height: 36px; border-radius: 8px; font-size: 1.1rem; cursor: pointer; transition: background 0.15s; display: flex; align-items: center; justify-content: center; }
  .nav-btn:hover { background: var(--border2); color: var(--text); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-info { text-align: center; flex: 1; }
  .nav-main { font-size: 1.15rem; font-weight: 700; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .nav-sub { font-size: 0.82rem; color: var(--text3); margin-top: 2px; }
  .today-btn { background: #1d4ed8; border: none; color: #fff; padding: 6px 12px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; white-space: nowrap; }
  .today-btn:hover { background: #2563eb; }
  .today-btn.hidden { visibility: hidden; pointer-events: none; }

  /* PROGRESS */
  .progress-wrap { margin-bottom: 14px; }
  .progress-bar-bg { background: var(--bg2); border-radius: 20px; height: 10px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, #60a5fa, #a78bfa); border-radius: 20px; transition: width 0.4s ease; }
  .progress-text { text-align: center; font-size: 0.8rem; color: var(--text3); margin-top: 5px; }

  .monthly-alert { background: #064e3b; border: 1px solid #065f46; border-radius: 12px; padding: 12px 18px; margin-bottom: 14px; font-size: 0.9rem; color: #6ee7b7; text-align: center; display: none; }

  /* EDIT MODE TOOLBAR */
  .edit-toolbar { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; }
  .edit-toggle { background: var(--border); border: none; color: var(--text2); padding: 7px 14px; border-radius: 8px; font-size: 0.82rem; cursor: pointer; transition: all 0.15s; }
  .edit-toggle:hover { background: var(--border2); color: var(--text); }
  .edit-toggle.on { background: #1d4ed8; color: #fff; }
  .reset-schedule { background: none; border: 1px solid var(--border); color: var(--text3); padding: 7px 14px; border-radius: 8px; font-size: 0.82rem; cursor: pointer; transition: all 0.15s; margin-left: auto; }
  .reset-schedule:hover { border-color: var(--border2); color: var(--text2); }

  /* PERIOD HEADER */
  .period-header { font-size: 0.78rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text2); margin: 16px 0 8px; display: flex; align-items: center; gap: 8px; }
  .period-name-input { background: var(--bg2); border: 1px solid #3b82f6; color: var(--text); border-radius: 6px; padding: 3px 8px; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; outline: none; width: 160px; }
  .del-period-btn { margin-left: auto; background: none; border: none; color: var(--text4); font-size: 0.8rem; cursor: pointer; padding: 2px 6px; border-radius: 6px; }
  .del-period-btn:hover { background: #3b1c1c; color: #f87171; }

  /* TIMELINE */
  .timeline { position: relative; padding-left: 70px; margin-bottom: 6px; }
  .timeline::before { content: ''; position: absolute; left: 56px; top: 0; bottom: 0; width: 2px; background: var(--timeline); border-radius: 2px; }
  .time-group { position: relative; margin-bottom: 6px; }
  .time-label { position: absolute; left: -70px; top: 50%; transform: translateY(-50%); width: 58px; text-align: right; font-size: 0.78rem; color: #60a5fa; font-weight: 600; line-height: 1.2; cursor: pointer; border-radius: 6px; padding: 2px 4px; transition: background 0.15s; z-index: 2; }
  .time-label:hover { background: var(--time-hover); color: #93c5fd; }
  .time-label.edited { color: #a78bfa; }
  .time-input { position: absolute; left: -74px; top: 50%; transform: translateY(-50%); width: 66px; background: var(--timeline); border: 1px solid #60a5fa; color: var(--text); font-size: 0.78rem; font-weight: 600; border-radius: 6px; padding: 3px 4px; text-align: center; outline: none; z-index: 10; }
  .time-input::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.5; width: 10px; }
  .time-dot { position: absolute; left: -17px; top: 50%; transform: translateY(-50%); width: 10px; height: 10px; border-radius: 50%; background: var(--dot-bg); border: 2px solid var(--border); transition: background 0.2s, border-color 0.2s; z-index: 1; }

  /* TASK CARD */
  .task-item { position: relative; display: flex; align-items: center; gap: 10px; padding: 11px 14px; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; transition: background 0.15s, border-color 0.15s; user-select: none; }
  .task-item:hover { background: var(--bg3); border-color: var(--border2); }
  .task-item.done { border-color: var(--timeline); }
  .task-item.done .task-label { text-decoration: line-through; color: var(--text4); }
  .task-item.done .checkbox { background: #3b82f6; border-color: #3b82f6; }
  .task-item.done .checkbox::after { opacity: 1; }
  .task-item.done .time-dot { background: #3b82f6; border-color: #3b82f6; }
  .checkbox { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border2); flex-shrink: 0; position: relative; transition: all 0.2s; }
  .checkbox::after { content: ''; position: absolute; top: 3px; left: 6px; width: 6px; height: 11px; border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(45deg); opacity: 0; transition: opacity 0.2s; }
  .task-main { flex: 1; min-width: 0; }
  .task-label { font-size: 0.95rem; display: block; }
  .task-duration { font-size: 0.75rem; color: var(--text3); margin-top: 2px; display: block; }

  /* EDIT MODE — task controls */
  .task-edit-controls { display: none; gap: 4px; flex-shrink: 0; }
  .edit-mode .task-edit-controls { display: flex; }
  .edit-mode .task-item { cursor: default; }
  .edit-mode .task-item:hover { background: var(--bg2); border-color: var(--border); }
  .edit-mode .checkbox { display: none; }
  .task-edit-btn { background: var(--border); border: none; color: var(--text2); width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .task-edit-btn:hover { background: var(--border2); color: var(--text); }
  .task-del-btn { background: #3b1c1c; border: none; color: #f87171; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .task-del-btn:hover { background: #7f1d1d; }

  /* INLINE EDIT FORM */
  .inline-edit { display: flex; flex-direction: column; gap: 6px; flex: 1; }
  .inline-edit input { background: var(--inp-bg); border: 1px solid #3b82f6; color: var(--text); border-radius: 6px; padding: 5px 8px; font-size: 0.88rem; outline: none; }
  .inline-edit input::placeholder { color: var(--text4); }
  .inline-edit-actions { display: flex; gap: 6px; }
  .ie-save { background: #1d4ed8; border: none; color: #fff; padding: 4px 12px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; }
  .ie-cancel { background: var(--border); border: none; color: var(--text2); padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; }

  /* ADD TASK BUTTON */
  .add-task-row { padding-left: 70px; margin-bottom: 8px; }
  .add-task-btn { background: none; border: 1px dashed var(--border); color: var(--text4); border-radius: 10px; padding: 7px 14px; font-size: 0.82rem; cursor: pointer; width: 100%; text-align: left; transition: all 0.15s; }
  .add-task-btn:hover { border-color: #3b82f6; color: #60a5fa; }

  /* ADD TASK INLINE FORM */
  .add-task-form { padding-left: 70px; margin-bottom: 8px; display: flex; flex-direction: column; gap: 6px; }
  .add-task-form input { background: var(--inp-bg); border: 1px solid #3b82f6; color: var(--text); border-radius: 8px; padding: 7px 10px; font-size: 0.9rem; outline: none; }
  .add-task-form input::placeholder { color: var(--text4); }
  .add-task-form-row { display: flex; gap: 6px; }
  .atf-save { background: #1d4ed8; border: none; color: #fff; padding: 7px 16px; border-radius: 8px; font-size: 0.85rem; cursor: pointer; }
  .atf-cancel { background: var(--border); border: none; color: var(--text2); padding: 7px 12px; border-radius: 8px; font-size: 0.85rem; cursor: pointer; }

  /* ADD PERIOD BUTTON */
  .add-period-btn { display: none; background: none; border: 1px dashed var(--border); color: var(--text4); border-radius: 10px; padding: 9px; font-size: 0.85rem; cursor: pointer; width: 100%; margin-bottom: 14px; transition: all 0.15s; }
  .edit-mode .add-period-btn { display: block; }
  .add-period-btn:hover { border-color: #a78bfa; color: #a78bfa; }

  /* MONTHLY SECTION */
  .monthly-section { background: var(--bg2); border-radius: 14px; border: 1px solid #065f46; margin-bottom: 14px; overflow: hidden; }
  .monthly-section .sec-head { background: #065f46; padding: 10px 16px; font-size: 0.82rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
  .monthly-section .task-item { border-radius: 0; border: none; border-bottom: 1px solid var(--bg); margin: 0; }
  .monthly-section .task-item:last-child { border-bottom: none; }

  .reset-times { background: none; border: 1px solid var(--border); color: var(--text3); padding: 6px 14px; border-radius: 8px; font-size: 0.78rem; cursor: pointer; margin-bottom: 16px; transition: all 0.15s; }
  .reset-times:hover { border-color: var(--border2); color: var(--text2); }

  /* HISTORY */
  .section-title { font-size: 0.82rem; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3); margin: 20px 0 10px; padding-left: 4px; }
  .history-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; margin-bottom: 30px; }
  .history-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
  .history-card:hover { border-color: #60a5fa; background: var(--bg3); }
  .history-card.active { border-color: #60a5fa; background: var(--bg3); }
  .history-card.today-card { border-color: #a78bfa; }
  .hc-day { font-size: 0.72rem; color: var(--text2); }
  .hc-date { font-size: 0.92rem; font-weight: 600; margin: 2px 0 6px; }
  .hc-bar-bg { background: var(--bg); border-radius: 10px; height: 5px; margin-bottom: 5px; overflow: hidden; }
  .hc-bar { height: 100%; border-radius: 10px; background: linear-gradient(90deg, #60a5fa, #a78bfa); }
  .hc-pct { font-size: 0.72rem; color: var(--text3); }
  .hc-pct.done-all { color: #34d399; }

  /* ═══ OYLIK REJALAR ═══ */
  .month-nav { display: flex; align-items: center; justify-content: space-between; background: var(--bg2); border-radius: 14px; padding: 12px 16px; margin-bottom: 16px; border: 1px solid var(--border); }
  .month-nav-info { text-align: center; flex: 1; }
  .month-nav-name { font-size: 1.2rem; font-weight: 700; background: linear-gradient(135deg, #f59e0b, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .month-nav-year { font-size: 0.82rem; color: var(--text3); margin-top: 2px; }
  .plans-progress-wrap { margin-bottom: 16px; }
  .plans-progress-bg { background: var(--bg2); border-radius: 20px; height: 10px; overflow: hidden; }
  .plans-progress-bar { height: 100%; background: linear-gradient(90deg, #f59e0b, #f97316); border-radius: 20px; transition: width 0.4s; }
  .plans-progress-text { text-align: center; font-size: 0.8rem; color: var(--text3); margin-top: 5px; }
  .cat-tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .cat-tab { padding: 5px 12px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; border: 1px solid var(--border); background: transparent; color: var(--text3); cursor: pointer; transition: all 0.15s; }
  .cat-tab.active { background: #92400e; border-color: #b45309; color: #fbbf24; }
  .cat-tab:hover:not(.active) { border-color: var(--border2); color: var(--text2); }
  .add-plan-form { display: flex; gap: 8px; margin-bottom: 14px; }
  .add-plan-input { flex: 1; background: var(--bg2); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 10px 14px; font-size: 0.92rem; outline: none; transition: border-color 0.15s; }
  .add-plan-input:focus { border-color: #f59e0b; }
  .add-plan-input::placeholder { color: var(--text4); }
  .add-plan-btn { background: #92400e; border: none; color: #fbbf24; padding: 10px 18px; border-radius: 10px; font-size: 0.9rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .add-plan-btn:hover { background: #b45309; }
  .plan-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .plan-item { display: flex; align-items: center; gap: 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; }
  .plan-item.done-plan { border-color: var(--timeline); }
  .plan-item.done-plan .plan-text { text-decoration: line-through; color: var(--text4); }
  .plan-item.done-plan .plan-check { background: #f59e0b; border-color: #f59e0b; }
  .plan-item.done-plan .plan-check::after { opacity: 1; }
  .plan-check { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border2); flex-shrink: 0; cursor: pointer; position: relative; transition: all 0.2s; }
  .plan-check::after { content: ''; position: absolute; top: 3px; left: 6px; width: 6px; height: 11px; border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(45deg); opacity: 0; transition: opacity 0.2s; }
  .plan-text { flex: 1; font-size: 0.95rem; cursor: pointer; transition: color 0.2s; word-break: break-word; color: var(--text); }
  .plan-tag { font-size: 0.72rem; padding: 2px 8px; border-radius: 20px; background: #451a03; color: #fbbf24; flex-shrink: 0; }
  .plan-del { background: none; border: none; color: var(--text4); font-size: 1rem; cursor: pointer; padding: 2px 6px; border-radius: 6px; transition: all 0.15s; flex-shrink: 0; }
  .plan-del:hover { background: #3b1c1c; color: #f87171; }
  .empty-state { text-align: center; padding: 30px 20px; color: var(--text4); font-size: 0.9rem; }
  .year-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 24px; }
  .year-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px; cursor: pointer; transition: all 0.15s; }
  .year-card:hover { border-color: #f59e0b; background: var(--bg3); }
  .year-card.active-month { border-color: #f59e0b; background: var(--bg3); }
  .yc-name { font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; }
  .yc-bar-bg { background: var(--bg); border-radius: 10px; height: 4px; margin-bottom: 4px; overflow: hidden; }
  .yc-bar { height: 100%; border-radius: 10px; background: linear-gradient(90deg, #f59e0b, #f97316); }
  .yc-count { font-size: 0.72rem; color: var(--text3); }
  .yc-count.yc-all { color: #34d399; }

  /* ═══ XARAJATLAR ═══ */
  .exp-month-nav { display: flex; align-items: center; justify-content: space-between; background: var(--bg2); border-radius: 14px; padding: 12px 16px; margin-bottom: 14px; border: 1px solid var(--border); }
  .exp-month-info { text-align: center; flex: 1; }
  .exp-month-name { font-size: 1.1rem; font-weight: 700; background: linear-gradient(135deg, #34d399, #059669); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .exp-month-year { font-size: 0.82rem; color: var(--text3); margin-top: 2px; }

  .exp-summary { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 14px; display: flex; gap: 10px; }
  .exp-sum-box { flex: 1; text-align: center; padding: 10px; background: var(--bg3); border-radius: 10px; }
  .exp-sum-label { font-size: 0.72rem; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .exp-sum-val { font-size: 1.05rem; font-weight: 700; color: var(--text); }
  .exp-sum-val.red { color: #f87171; }
  .exp-sum-val.green { color: #34d399; }

  .exp-add-form { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 14px; display: flex; flex-direction: column; gap: 10px; }
  .exp-add-row { display: flex; gap: 8px; }
  .exp-input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 10px 12px; font-size: 0.92rem; outline: none; transition: border-color 0.15s; min-width: 0; }
  .exp-input:focus { border-color: #34d399; }
  .exp-input::placeholder { color: var(--text4); }
  .exp-input.amount { width: 130px; flex: none; }
  .exp-date-input { background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 10px 12px; font-size: 0.88rem; outline: none; cursor: pointer; transition: border-color 0.15s; min-width: 130px; }
  .exp-date-input:focus { border-color: #34d399; }

  /* flatpickr tema override */
  .flatpickr-calendar { background: var(--bg2) !important; border: 1px solid var(--border) !important; border-radius: 14px !important; box-shadow: 0 8px 32px rgba(0,0,0,0.3) !important; font-family: 'Segoe UI', sans-serif !important; }
  .flatpickr-calendar.arrowTop:before, .flatpickr-calendar.arrowTop:after { border-bottom-color: var(--border) !important; }
  .flatpickr-months { background: var(--bg2) !important; border-radius: 14px 14px 0 0 !important; padding: 8px 0 4px !important; }
  .flatpickr-month { color: var(--text) !important; }
  .flatpickr-current-month { color: var(--text) !important; font-size: 1rem !important; }
  .flatpickr-current-month input.cur-year { color: var(--text) !important; }
  .flatpickr-monthDropdown-months { background: var(--bg2) !important; color: var(--text) !important; }
  .flatpickr-prev-month, .flatpickr-next-month { color: var(--text2) !important; fill: var(--text2) !important; }
  .flatpickr-prev-month:hover, .flatpickr-next-month:hover { color: var(--text) !important; fill: var(--text) !important; }
  .flatpickr-weekdays { background: var(--bg2) !important; }
  .flatpickr-weekday { color: var(--text3) !important; background: var(--bg2) !important; font-size: 0.78rem !important; }
  .flatpickr-days { border-color: var(--border) !important; }
  .dayContainer { background: var(--bg2) !important; }
  .flatpickr-day { color: var(--text) !important; border-radius: 8px !important; }
  .flatpickr-day:hover { background: var(--bg3) !important; border-color: var(--border) !important; }
  .flatpickr-day.today { border-color: #34d399 !important; color: #34d399 !important; font-weight: 700 !important; }
  .flatpickr-day.today:hover { background: #064e3b !important; }
  .flatpickr-day.selected { background: #065f46 !important; border-color: #059669 !important; color: #34d399 !important; font-weight: 700 !important; }
  .flatpickr-day.selected:hover { background: #047857 !important; }
  .flatpickr-day.flatpickr-disabled { color: var(--text4) !important; opacity: 0.4; }
  .flatpickr-day.inRange { background: #064e3b !important; border-color: transparent !important; color: #6ee7b7 !important; }
  .numInputWrapper:hover { background: var(--bg3) !important; }
  .exp-cat-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .exp-cat-btn { padding: 5px 10px; border-radius: 20px; font-size: 0.78rem; border: 1px solid var(--border); background: transparent; color: var(--text3); cursor: pointer; transition: all 0.15s; }
  .exp-cat-btn.active { background: #065f46; border-color: #059669; color: #34d399; }
  .exp-cat-btn:hover:not(.active) { border-color: var(--border2); color: var(--text2); }
  .exp-add-btn { background: #065f46; border: none; color: #34d399; padding: 10px 20px; border-radius: 10px; font-size: 0.92rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
  .exp-add-btn:hover { background: #047857; }

  .exp-day-group { margin-bottom: 14px; }
  .exp-day-header { display: flex; justify-content: space-between; align-items: center; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; padding: 0 2px; }
  .exp-day-total { font-size: 0.82rem; color: var(--text2); font-weight: 600; }

  .exp-item { display: flex; align-items: center; gap: 10px; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 11px 14px; margin-bottom: 6px; }
  .exp-cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .exp-item-main { flex: 1; min-width: 0; }
  .exp-item-text { font-size: 0.92rem; color: var(--text); }
  .exp-item-meta { font-size: 0.72rem; color: var(--text4); margin-top: 2px; }
  .exp-item-amount { font-size: 0.95rem; font-weight: 700; color: #f87171; flex-shrink: 0; }
  .exp-item-del { background: none; border: none; color: var(--text4); cursor: pointer; padding: 2px 6px; border-radius: 6px; font-size: 0.85rem; transition: all 0.15s; flex-shrink: 0; }
  .exp-item-del:hover { background: #3b1c1c; color: #f87171; }

  .exp-filter { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 14px; margin-bottom: 14px; }
  .exp-filter-title { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
  .exp-filter-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .exp-filter-sep { color: var(--text4); font-size: 0.85rem; flex-shrink: 0; }
  .exp-filter-btn { background: #065f46; border: none; color: #34d399; padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .exp-filter-btn:hover { background: #047857; }
  .exp-filter-clear { background: none; border: 1px solid var(--border); color: var(--text3); padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; cursor: pointer; white-space: nowrap; }
  .exp-filter-clear:hover { border-color: var(--border2); color: var(--text2); }
  .exp-filter-active { background: #064e3b; border: 1px solid #065f46; border-radius: 10px; padding: 8px 12px; font-size: 0.82rem; color: #6ee7b7; display: none; margin-top: 8px; display: flex; align-items: center; justify-content: space-between; }
  .exp-filter-active.hidden { display: none; }
</style>
</head>
<body>
<div class="container">

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('daily')">☀️ Kun</button>
    <button class="tab-btn" onclick="switchTab('monthly')">📅 Reja</button>
    <button class="tab-btn" onclick="switchTab('expense')">💰 Xarajat</button>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Tema o'zgartirish">🌙</button>
  </div>

  <!-- ═══ KUN TARTIBI ═══ -->
  <div id="tab-daily" class="tab-panel active">

    <div class="day-nav">
      <button class="nav-btn" id="prevBtn" onclick="changeDay(-1)">&#8592;</button>
      <div class="nav-info">
        <div class="nav-main" id="dayName"></div>
        <div class="nav-sub" id="dayDate"></div>
      </div>
      <button class="today-btn hidden" id="todayBtn" onclick="goToday()">Bugun</button>
      <button class="nav-btn" id="nextBtn" onclick="changeDay(1)">&#8594;</button>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
      <div class="progress-text" id="progressText"></div>
    </div>

    <div class="monthly-alert" id="monthlyAlert">
      🌍 Bu oyning 4-haftasi — o'zing uchun sayohat rejalashtirishni unutma!
    </div>

    <!-- Edit toolbar -->
    <div class="edit-toolbar">
      <button class="edit-toggle" id="editToggle" onclick="toggleEditMode()">✏️ Jadvalni tahrirlash</button>
    </div>

    <div id="scheduleWrap">
      <div id="schedule"></div>
      <button class="add-period-btn" onclick="addPeriod()">+ Bo'lim qo'shish</button>
    </div>

    <div class="section-title">📋 Oxirgi 14 kun tarixi</div>
    <div class="history-grid" id="historyGrid"></div>
  </div>

  <!-- ═══ XARAJATLAR ═══ -->
  <div id="tab-expense" class="tab-panel">

    <div class="exp-month-nav">
      <button class="nav-btn" onclick="changeExpMonth(-1)">&#8592;</button>
      <div class="exp-month-info">
        <div class="exp-month-name" id="expMonthName"></div>
        <div class="exp-month-year" id="expMonthYear"></div>
      </div>
      <button class="nav-btn" id="expThisMonthBtn" onclick="goExpThisMonth()">Bu oy</button>
      <button class="nav-btn" onclick="changeExpMonth(1)" id="expNextMonthBtn">&#8594;</button>
    </div>

    <div class="exp-summary" id="expSummary"></div>

    <!-- Filter -->
    <div class="exp-filter">
      <div class="exp-filter-title">📅 Vaqt oralig'i bo'yicha filter</div>
      <div class="exp-filter-row">
        <input class="exp-date-input" id="filterRange" placeholder="Sanani tanlang..." readonly style="flex:1; min-width:0; cursor:pointer;">
        <button class="exp-filter-clear" onclick="clearFilter()">✕</button>
      </div>
      <div class="exp-filter-active hidden" id="filterActive"></div>
    </div>

    <div class="exp-add-form">
      <input class="exp-input" id="expText" placeholder="Nima uchun?" maxlength="80" onkeydown="if(event.key==='Enter') addExpense()">
      <div class="exp-add-row">
        <input class="exp-input amount" id="expAmount" placeholder="Summa (so'm)" type="number" min="0" style="flex:1;">
        <input class="exp-date-input" id="expDate" type="text" readonly style="flex:1; cursor:pointer;">
        <button class="exp-add-btn" onclick="addExpense()">+</button>
      </div>
      <div class="exp-cat-row" id="expCatRow"></div>
    </div>

    <div id="expList"></div>

  </div>

  <!-- ═══ OYLIK REJALAR ═══ -->
  <div id="tab-monthly" class="tab-panel">
    <div class="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">&#8592;</button>
      <div class="month-nav-info">
        <div class="month-nav-name" id="monthName"></div>
        <div class="month-nav-year" id="monthYear"></div>
      </div>
      <button class="nav-btn" id="thisMonthBtn" onclick="goThisMonth()">Bu oy</button>
      <button class="nav-btn" onclick="changeMonth(1)" id="nextMonthBtn">&#8594;</button>
    </div>
    <div class="plans-progress-wrap">
      <div class="plans-progress-bg"><div class="plans-progress-bar" id="plansProgressBar" style="width:0%"></div></div>
      <div class="plans-progress-text" id="plansProgressText"></div>
    </div>
    <div class="cat-tabs" id="catTabs"></div>
    <div class="add-plan-form">
      <input class="add-plan-input" id="planInput" placeholder="Yangi reja yozing..." maxlength="120" onkeydown="if(event.key==='Enter') addPlan()">
      <button class="add-plan-btn" onclick="addPlan()">+ Qo'shish</button>
    </div>
    <div class="plan-list" id="planList"></div>
    <div class="section-title">📆 Yillik ko'rinish</div>
    <div class="year-grid" id="yearGrid"></div>
  </div>

</div>
<script>
/* ═══════════ UMUMIY ═══════════ */
const DAYS_UZ   = ['Yakshanba','Dushanba','Seshanba','Chorshanba','Payshanba','Juma','Shanba'];
const MONTHS_UZ = ['Yanvar','Fevral','Mart','Aprel','May','Iyun','Iyul','Avgust','Sentabr','Oktabr','Noyabr','Dekabr'];
function pad(n){ return n<10?'0'+n:''+n; }
function escHtml(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function switchTab(name){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',['daily','monthly','expense'][i]===name));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='monthly') renderMonthly();
  if(name==='expense') renderExpense();
}

/* ═══════════ KUN TARTIBI ═══════════ */
const DEFAULT_SCHEDULE = [
  { period:'🌙 Kecha', items:[
    { id:'sleep',    label:'Uxlash',                  duration:'7–8 soat',     time:'22:00' }]},
  { period:'🌅 Ertalab', items:[
    { id:'morning',  label:'Ertalabki namoz + sport',  duration:'30–40 daqiqa', time:'05:30' },
    { id:'breakfast',label:'Nonushta',                 duration:'20 daqiqa',    time:'07:00' }]},
  { period:'☀️ Kun', items:[
    { id:'work',     label:'Asosiy faoliyat',           duration:'8 soat',       time:'09:00' },
    { id:'lunch',    label:'Tushlik',                   duration:'30 daqiqa',    time:'13:00' }]},
  { period:'🌆 Kechqurun', items:[
    { id:'reading',  label:"Kitob o'qish",              duration:'30–60 daqiqa', time:'18:00' },
    { id:'family',   label:'Oila bilan vaqt',           duration:'1–2 soat',     time:'19:00' }]},
  { period:'🌃 Kech', items:[
    { id:'selfdev',  label:'Shaxsiy rivojlanish',       duration:'30 daqiqa',    time:'21:00' }]},
];

function getSchedule(){
  const r = localStorage.getItem('custom_schedule');
  return r ? JSON.parse(r) : JSON.parse(JSON.stringify(DEFAULT_SCHEDULE));
}
function saveSchedule(data){
  localStorage.setItem('custom_schedule', JSON.stringify(data));
}
function getAllIds(schedule){ return schedule.flatMap(g=>g.items.map(i=>i.id)); }

let selectedDate = dateKey(new Date());
let editMode = false;

function dateKey(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function parseDate(k){ const[y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d); }
function isWeek4(d){ return d.getDate()>=22&&d.getDate()<=28; }
function loadDone(k){ const r=localStorage.getItem('tasks_'+k); return r?JSON.parse(r):[]; }
function saveDone(k,a){ localStorage.setItem('tasks_'+k,JSON.stringify(a)); }
function loadTimes(){ const r=localStorage.getItem('custom_times'); return r?JSON.parse(r):{}; }
function saveTime(id,v){ const t=loadTimes(); t[id]=v; localStorage.setItem('custom_times',JSON.stringify(t)); }
function resetTimes(){ if(confirm("Barcha soatlar asl holatiga qaytarilsinmi?")){ localStorage.removeItem('custom_times'); renderDaily(); } }

function toggleEditMode(){
  editMode = !editMode;
  const btn = document.getElementById('editToggle');
  btn.textContent = editMode ? '✓ Tahrirlashni yakunlash' : '✏️ Jadvalni tahrirlash';
  btn.classList.toggle('on', editMode);
  renderDaily();
}

/* ── jadval qurish ── */
function buildSchedule(schedule, done){
  const container = document.getElementById('schedule');
  container.innerHTML = '';
  if(editMode) container.classList.add('edit-mode');
  else container.classList.remove('edit-mode');

  const ct = loadTimes();

  schedule.forEach((group, gIdx) => {
    /* Period header */
    const header = document.createElement('div');
    header.className = 'period-header';
    if(editMode){
      const nameInp = document.createElement('input');
      nameInp.className = 'period-name-input';
      nameInp.value = group.period;
      nameInp.addEventListener('change', ()=>{
        schedule[gIdx].period = nameInp.value;
        saveSchedule(schedule);
      });
      const delBtn = document.createElement('button');
      delBtn.className = 'del-period-btn'; delBtn.textContent = '✕ Bo\'limni o\'chirish';
      delBtn.addEventListener('click', ()=>{
        if(confirm("Bu bo'lim o'chirilsinmi?")){ schedule.splice(gIdx,1); saveSchedule(schedule); renderDaily(); }
      });
      header.appendChild(nameInp); header.appendChild(delBtn);
    } else {
      header.textContent = group.period;
    }
    container.appendChild(header);

    /* Tasks */
    const tl = document.createElement('div'); tl.className = 'timeline';

    group.items.forEach((item, iIdx) => {
      const curTime = ct[item.id]||item.time;
      const wrap = document.createElement('div'); wrap.className = 'time-group';
      const dot  = document.createElement('div'); dot.className = 'time-dot';

      /* Time label */
      const lbl = document.createElement('div');
      lbl.className = 'time-label'+(ct[item.id]?' edited':'');
      lbl.textContent = curTime;
      if(!editMode){
        lbl.title = "Soatni o'zgartirish";
        lbl.addEventListener('click', e=>{ e.stopPropagation(); openTimeEditor(lbl,item.id,curTime); });
      }

      /* Card */
      const card = document.createElement('div');
      card.className = 'task-item'+(done.includes(item.id)?' done':'');
      card.dataset.id = item.id;

      if(editMode){
        /* Edit mode: show inline editor */
        card.innerHTML =
          '<div class="task-main">'+
            '<span class="task-label">'+escHtml(item.label)+'</span>'+
            '<span class="task-duration">'+escHtml(item.duration)+'</span>'+
          '</div>'+
          '<div class="task-edit-controls">'+
            '<button class="task-edit-btn" title="Tahrirlash">✏️</button>'+
            '<button class="task-del-btn" title="O\'chirish">✕</button>'+
          '</div>';

        card.querySelector('.task-edit-btn').addEventListener('click', ()=>{
          openInlineEdit(card, item, gIdx, iIdx, schedule);
        });
        card.querySelector('.task-del-btn').addEventListener('click', ()=>{
          if(confirm("Vazifa o'chirilsinmi?")){ group.items.splice(iIdx,1); saveSchedule(schedule); renderDaily(); }
        });
      } else {
        card.innerHTML =
          '<div class="checkbox"></div>'+
          '<div class="task-main">'+
            '<span class="task-label">'+escHtml(item.label)+'</span>'+
            '<span class="task-duration">'+escHtml(item.duration)+'</span>'+
          '</div>';
        card.addEventListener('click', ()=>toggle(item.id));
      }

      wrap.appendChild(lbl); wrap.appendChild(dot); wrap.appendChild(card);
      tl.appendChild(wrap);
    });

    container.appendChild(tl);

    /* Add task button (edit mode only) */
    if(editMode){
      const addRow = document.createElement('div'); addRow.className = 'add-task-row';
      const addBtn = document.createElement('button'); addBtn.className = 'add-task-btn';
      addBtn.textContent = '+ Vazifa qo\'shish';
      addBtn.addEventListener('click', ()=>{ addBtn.style.display='none'; showAddTaskForm(addRow, gIdx, schedule, addBtn); });
      addRow.appendChild(addBtn); container.appendChild(addRow);
    }
  });
}

function openInlineEdit(card, item, gIdx, iIdx, schedule){
  /* already editing? */
  if(card.querySelector('.inline-edit')) return;
  const main = card.querySelector('.task-main');
  main.style.display='none';

  const form = document.createElement('div'); form.className='inline-edit';
  const labelInp = document.createElement('input'); labelInp.value=item.label; labelInp.placeholder='Vazifa nomi';
  const durInp   = document.createElement('input'); durInp.value=item.duration; durInp.placeholder='Davomiyligi (masalan: 1 soat)';
  const actions  = document.createElement('div'); actions.className='inline-edit-actions';
  const saveBtn  = document.createElement('button'); saveBtn.className='ie-save'; saveBtn.textContent='Saqlash';
  const cancelBtn= document.createElement('button'); cancelBtn.className='ie-cancel'; cancelBtn.textContent='Bekor';

  saveBtn.addEventListener('click', ()=>{
    item.label    = labelInp.value.trim()||item.label;
    item.duration = durInp.value.trim()||item.duration;
    schedule[gIdx].items[iIdx] = item;
    saveSchedule(schedule); renderDaily();
  });
  cancelBtn.addEventListener('click', ()=>{ form.remove(); main.style.display=''; });

  actions.appendChild(saveBtn); actions.appendChild(cancelBtn);
  form.appendChild(labelInp); form.appendChild(durInp); form.appendChild(actions);
  card.insertBefore(form, card.querySelector('.task-edit-controls'));
  labelInp.focus(); labelInp.select();
}

function showAddTaskForm(container, gIdx, schedule, addBtn){
  const form = document.createElement('div'); form.className='add-task-form';
  const labelInp = document.createElement('input'); labelInp.placeholder='Vazifa nomi'; labelInp.style.marginTop='6px';
  const durInp   = document.createElement('input'); durInp.placeholder='Davomiyligi (masalan: 30 daqiqa)';
  const row = document.createElement('div'); row.className='add-task-form-row';
  const saveBtn = document.createElement('button'); saveBtn.className='atf-save'; saveBtn.textContent='Qo\'shish';
  const cancelBtn=document.createElement('button'); cancelBtn.className='atf-cancel'; cancelBtn.textContent='Bekor';

  saveBtn.addEventListener('click', ()=>{
    const label = labelInp.value.trim(); if(!label) return;
    const newItem = { id:'task_'+Date.now(), label, duration: durInp.value.trim()||'—', time:'09:00' };
    schedule[gIdx].items.push(newItem);
    saveSchedule(schedule); renderDaily();
  });
  cancelBtn.addEventListener('click', ()=>{ form.remove(); addBtn.style.display=''; });

  row.appendChild(saveBtn); row.appendChild(cancelBtn);
  form.appendChild(labelInp); form.appendChild(durInp); form.appendChild(row);
  container.appendChild(form); labelInp.focus();
}

function addPeriod(){
  const schedule = getSchedule();
  schedule.push({ period:'🕐 Yangi bo\'lim', items:[] });
  saveSchedule(schedule); renderDaily();
}

function openTimeEditor(lbl, id, cur){
  const ex=lbl.parentNode.querySelector('.time-input');
  if(ex){ ex.remove(); lbl.style.visibility='visible'; return; }
  lbl.style.visibility='hidden';
  const inp=document.createElement('input'); inp.type='time'; inp.value=cur; inp.className='time-input';
  function confirm(){ if(inp.value) saveTime(id,inp.value); inp.remove(); renderDaily(); }
  inp.addEventListener('change',confirm); inp.addEventListener('blur',confirm);
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') confirm(); if(e.key==='Escape'){ inp.remove(); lbl.style.visibility='visible'; } });
  lbl.parentNode.insertBefore(inp,lbl); inp.focus();
}

function renderDaily(){
  const d=parseDate(selectedDate), done=loadDone(selectedDate);
  const today=dateKey(new Date());
  const schedule=getSchedule();

  document.getElementById('dayName').textContent = DAYS_UZ[d.getDay()];
  document.getElementById('dayDate').textContent = d.getDate()+' '+MONTHS_UZ[d.getMonth()]+' '+d.getFullYear();
  document.getElementById('todayBtn').classList.toggle('hidden', selectedDate===today);
  document.getElementById('nextBtn').disabled = selectedDate>=today;
  document.getElementById('monthlyAlert').style.display = isWeek4(d)?'block':'none';

  buildSchedule(schedule, done);

  const soloEl=document.querySelector('#tab-daily [data-id="solo_trip"]');
  if(soloEl) soloEl.classList.toggle('done', done.includes('solo_trip'));

  const ids=getAllIds(schedule), count=ids.filter(id=>done.includes(id)).length;
  const pct=ids.length?Math.round(count/ids.length*100):0;
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('progressText').textContent=count+' / '+ids.length+' vazifa bajarildi ('+pct+'%)';

  renderHistory();
}

function renderHistory(){
  const grid=document.getElementById('historyGrid'), today=dateKey(new Date());
  grid.innerHTML='';
  const schedule=getSchedule();
  for(let i=13;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const key=dateKey(d), done=loadDone(key);
    const ids=getAllIds(schedule), count=ids.filter(id=>done.includes(id)).length;
    const pct=ids.length?Math.round(count/ids.length*100):0;
    const card=document.createElement('div');
    card.className='history-card'+(key===selectedDate?' active':'')+(key===today?' today-card':'');
    card.innerHTML='<div class="hc-day">'+DAYS_UZ[d.getDay()]+(key===today?' • Bugun':'')+'</div>'+
      '<div class="hc-date">'+d.getDate()+' '+MONTHS_UZ[d.getMonth()]+'</div>'+
      '<div class="hc-bar-bg"><div class="hc-bar" style="width:'+pct+'%"></div></div>'+
      '<div class="hc-pct'+(pct===100?' done-all':'')+'">'+count+'/'+ids.length+' — '+pct+'%</div>';
    card.addEventListener('click',()=>{ selectedDate=key; renderDaily(); });
    grid.appendChild(card);
  }
}

function toggle(id){
  const done=loadDone(selectedDate), idx=done.indexOf(id);
  if(idx>=0) done.splice(idx,1); else done.push(id);
  saveDone(selectedDate,done); renderDaily();
}
function changeDay(dir){
  const d=parseDate(selectedDate); d.setDate(d.getDate()+dir);
  if(dateKey(d)>dateKey(new Date())) return;
  selectedDate=dateKey(d); renderDaily();
}
function goToday(){ selectedDate=dateKey(new Date()); renderDaily(); }

/* ═══════════ OYLIK REJALAR ═══════════ */
const CATEGORIES=[
  {id:'all',label:'Hammasi'},{id:'travel',label:'✈️ Sayohat'},
  {id:'family',label:'👨‍👩‍👧 Oila'},{id:'work',label:'💼 Ish'},
  {id:'self',label:"📚 O'zim"},{id:'other',label:'📌 Boshqa'},
];
let selectedMonthKey=monthKey(new Date()), selectedCat='all';
function monthKey(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1); }
function parseMonth(k){ const[y,m]=k.split('-').map(Number); return new Date(y,m-1,1); }
function loadPlans(mk){ const r=localStorage.getItem('plans_'+mk); return r?JSON.parse(r):[]; }
function savePlans(mk,a){ localStorage.setItem('plans_'+mk,JSON.stringify(a)); }
function addPlan(){
  const inp=document.getElementById('planInput'), text=inp.value.trim(); if(!text) return;
  const plans=loadPlans(selectedMonthKey), cat=selectedCat==='all'?'other':selectedCat;
  plans.push({id:Date.now()+'',text,cat,done:false});
  savePlans(selectedMonthKey,plans); inp.value=''; renderMonthly();
}
function togglePlan(id){ const p=loadPlans(selectedMonthKey),i=p.find(x=>x.id===id); if(i) i.done=!i.done; savePlans(selectedMonthKey,p); renderMonthly(); }
function deletePlan(id){ savePlans(selectedMonthKey,loadPlans(selectedMonthKey).filter(p=>p.id!==id)); renderMonthly(); }
function renderMonthly(){
  const d=parseMonth(selectedMonthKey), thisMk=monthKey(new Date());
  document.getElementById('monthName').textContent=MONTHS_UZ[d.getMonth()];
  document.getElementById('monthYear').textContent=d.getFullYear()+' yil';
  document.getElementById('thisMonthBtn').style.visibility=selectedMonthKey===thisMk?'hidden':'visible';
  const catEl=document.getElementById('catTabs'); catEl.innerHTML='';
  CATEGORIES.forEach(c=>{ const b=document.createElement('button'); b.className='cat-tab'+(selectedCat===c.id?' active':''); b.textContent=c.label; b.addEventListener('click',()=>{ selectedCat=c.id; renderMonthly(); }); catEl.appendChild(b); });
  const allPlans=loadPlans(selectedMonthKey), filtered=selectedCat==='all'?allPlans:allPlans.filter(p=>p.cat===selectedCat);
  const list=document.getElementById('planList'); list.innerHTML='';
  if(!filtered.length){ const em=document.createElement('div'); em.className='empty-state'; em.textContent=selectedCat==='all'?"Hali reja yo'q. Yuqoridagi maydonga yozing!":"Bu kategoriyada reja yo'q."; list.appendChild(em); }
  else filtered.forEach(p=>{ const cl=CATEGORIES.find(c=>c.id===p.cat)||CATEGORIES[5]; const el=document.createElement('div'); el.className='plan-item'+(p.done?' done-plan':''); el.innerHTML='<div class="plan-check"></div><span class="plan-text">'+escHtml(p.text)+'</span><span class="plan-tag">'+cl.label+'</span><button class="plan-del">✕</button>'; el.querySelector('.plan-check').addEventListener('click',()=>togglePlan(p.id)); el.querySelector('.plan-text').addEventListener('click',()=>togglePlan(p.id)); el.querySelector('.plan-del').addEventListener('click',()=>{ if(confirm("O'chirilsinmi?")) deletePlan(p.id); }); list.appendChild(el); });
  const total=allPlans.length, done=allPlans.filter(p=>p.done).length, pct=total?Math.round(done/total*100):0;
  document.getElementById('plansProgressBar').style.width=pct+'%';
  document.getElementById('plansProgressText').textContent=total?done+' / '+total+' reja bajarildi ('+pct+'%)':"Bu oyda hali reja yo'q";
  renderYearGrid();
}
function renderYearGrid(){
  const grid=document.getElementById('yearGrid'); grid.innerHTML='';
  const year=parseMonth(selectedMonthKey).getFullYear();
  for(let m=0;m<12;m++){
    const mk=year+'-'+pad(m+1), plans=loadPlans(mk), total=plans.length, done=plans.filter(p=>p.done).length, pct=total?Math.round(done/total*100):0;
    const card=document.createElement('div'); card.className='year-card'+(mk===selectedMonthKey?' active-month':'');
    card.innerHTML='<div class="yc-name">'+MONTHS_UZ[m]+'</div><div class="yc-bar-bg"><div class="yc-bar" style="width:'+pct+'%"></div></div><div class="yc-count'+(pct===100&&total>0?' yc-all':'')+'">'+( total?done+'/'+total+' reja':'-')+'</div>';
    card.addEventListener('click',()=>{ selectedMonthKey=mk; renderMonthly(); }); grid.appendChild(card);
  }
}
function changeMonth(dir){ const d=parseMonth(selectedMonthKey); d.setMonth(d.getMonth()+dir); selectedMonthKey=monthKey(d); renderMonthly(); }
function goThisMonth(){ selectedMonthKey=monthKey(new Date()); renderMonthly(); }

/* ═══════════ XARAJATLAR ═══════════ */
const EXP_CATS = [
  { id:'food',      label:'🍔 Ovqat',      color:'#f97316' },
  { id:'transport', label:'🚗 Transport',   color:'#60a5fa' },
  { id:'shopping',  label:'🛒 Xarid',       color:'#a78bfa' },
  { id:'health',    label:'💊 Sog\'liq',    color:'#34d399' },
  { id:'edu',       label:'🎓 Ta\'lim',     color:'#fbbf24' },
  { id:'home',      label:'🏠 Uy',          color:'#f472b6' },
  { id:'other',     label:'📌 Boshqa',      color:'#94a3b8' },
];

let expMonthKey = monthKey(new Date());
let expCat = 'food';
let expFilter = null; // { from: 'YYYY-MM-DD', to: 'YYYY-MM-DD' }

function loadExpenses(mk){ const r=localStorage.getItem('exp_'+mk); return r?JSON.parse(r):[]; }
function saveExpenses(mk,a){ localStorage.setItem('exp_'+mk,JSON.stringify(a)); }
function fmtMoney(n){ return Number(n).toLocaleString('uz-UZ')+' so\'m'; }

function getAllExpensesInRange(from, to){
  // from va to orasidagi barcha oylarni aylanib chiqamiz
  const result = [];
  const cur = new Date(from+'T00:00:00');
  const end = new Date(to+'T00:00:00');
  const seen = new Set();
  while(cur <= end){
    const mk = monthKey(cur);
    if(!seen.has(mk)){
      seen.add(mk);
      loadExpenses(mk).forEach(e=>{ if(e.date>=from && e.date<=to) result.push(e); });
    }
    cur.setMonth(cur.getMonth()+1);
  }
  return result;
}

function applyFilter(from, to){
  expFilter = { from, to };
  renderExpense();
}

function clearFilter(){
  expFilter = null;
  const fp = document.getElementById('filterRange')._flatpickr;
  if(fp) fp.clear();
  renderExpense();
}

function addExpense(){
  const text   = document.getElementById('expText').value.trim();
  const amount = parseFloat(document.getElementById('expAmount').value);
  const date   = document.getElementById('expDate').value;
  if(!text || !amount || amount<=0 || !date) return;

  const list = loadExpenses(monthKey(new Date(date+'T00:00:00')));
  list.push({ id:Date.now()+'', text, amount, cat:expCat, date });
  saveExpenses(monthKey(new Date(date+'T00:00:00')), list);

  document.getElementById('expText').value = '';
  document.getElementById('expAmount').value = '';
  document.getElementById('expDate').value = dateKey(new Date());
  renderExpense();
}

function deleteExpense(mk, id){
  saveExpenses(mk, loadExpenses(mk).filter(e=>e.id!==id));
  renderExpense();
}

function renderExpense(){
  const d = parseMonth(expMonthKey);
  const thisMk = monthKey(new Date());
  document.getElementById('expMonthName').textContent = MONTHS_UZ[d.getMonth()];
  document.getElementById('expMonthYear').textContent = d.getFullYear()+' yil';
  document.getElementById('expThisMonthBtn').style.visibility = expMonthKey===thisMk?'hidden':'visible';

  // default date — flatpickr o'zi 'today' qiladi, qo'lda tegilmaydi

  // cat buttons
  const catRow = document.getElementById('expCatRow');
  catRow.innerHTML = '';
  EXP_CATS.forEach(c=>{
    const btn = document.createElement('button');
    btn.className = 'exp-cat-btn'+(expCat===c.id?' active':'');
    btn.textContent = c.label;
    btn.addEventListener('click', ()=>{ expCat=c.id; renderExpense(); });
    catRow.appendChild(btn);
  });

  // filter holati
  const filterEl = document.getElementById('filterActive');
  let expenses;
  if(expFilter){
    expenses = getAllExpensesInRange(expFilter.from, expFilter.to);
    filterEl.classList.remove('hidden');
    const fd = parseDate(expFilter.from), td = parseDate(expFilter.to);
    filterEl.innerHTML =
      '<span>🔍 '+fd.getDate()+' '+MONTHS_UZ[fd.getMonth()]+' — '+td.getDate()+' '+MONTHS_UZ[td.getMonth()]+' '+td.getFullYear()+'</span>'+
      '<strong>'+fmtMoney(expenses.reduce((s,e)=>s+e.amount,0))+'</strong>';
    // oy navigatsiyasini yashirish
    document.querySelector('.exp-month-nav').style.display = 'none';
  } else {
    expenses = loadExpenses(expMonthKey);
    filterEl.classList.add('hidden');
    document.querySelector('.exp-month-nav').style.display = '';
  }

  const total = expenses.reduce((s,e)=>s+e.amount, 0);
  const todayExp = expenses.filter(e=>e.date===dateKey(new Date())).reduce((s,e)=>s+e.amount,0);

  // summary
  document.getElementById('expSummary').innerHTML =
    '<div class="exp-sum-box"><div class="exp-sum-label">'+(expFilter?'Jami':'Oylik jami')+'</div><div class="exp-sum-val red">'+fmtMoney(total)+'</div></div>'+
    '<div class="exp-sum-box"><div class="exp-sum-label">Bugungi</div><div class="exp-sum-val red">'+fmtMoney(todayExp)+'</div></div>'+
    '<div class="exp-sum-box"><div class="exp-sum-label">Yozuvlar</div><div class="exp-sum-val">'+expenses.length+' ta</div></div>';

  // group by date
  const byDate = {};
  expenses.forEach(e=>{ if(!byDate[e.date]) byDate[e.date]=[]; byDate[e.date].push(e); });
  const sortedDates = Object.keys(byDate).sort((a,b)=>b.localeCompare(a));

  const list = document.getElementById('expList');
  list.innerHTML = '';

  if(!sortedDates.length){
    list.innerHTML = '<div class="empty-state">Hali xarajat yozilmagan.<br>Yuqoridagi formadan boshlang.</div>';
    return;
  }

  sortedDates.forEach(date=>{
    const items = byDate[date];
    const dayTotal = items.reduce((s,e)=>s+e.amount,0);
    const dd = parseDate(date);

    const group = document.createElement('div');
    group.className = 'exp-day-group';

    const hdr = document.createElement('div');
    hdr.className = 'exp-day-header';
    const isToday = date===dateKey(new Date());
    hdr.innerHTML =
      '<span>'+(isToday?'Bugun — ':'')+DAYS_UZ[dd.getDay()]+', '+dd.getDate()+' '+MONTHS_UZ[dd.getMonth()]+'</span>'+
      '<span class="exp-day-total">'+fmtMoney(dayTotal)+'</span>';
    group.appendChild(hdr);

    items.forEach(e=>{
      const cat = EXP_CATS.find(c=>c.id===e.cat)||EXP_CATS[6];
      const el = document.createElement('div');
      el.className = 'exp-item';
      el.innerHTML =
        '<div class="exp-cat-dot" style="background:'+cat.color+'"></div>'+
        '<div class="exp-item-main">'+
          '<div class="exp-item-text">'+escHtml(e.text)+'</div>'+
          '<div class="exp-item-meta">'+cat.label+'</div>'+
        '</div>'+
        '<div class="exp-item-amount">'+fmtMoney(e.amount)+'</div>'+
        '<button class="exp-item-del" title="O\'chirish">✕</button>';
      el.querySelector('.exp-item-del').addEventListener('click', ()=>{
        if(confirm("O'chirilsinmi?")) deleteExpense(monthKey(new Date(e.date+'T00:00:00')), e.id);
      });
      group.appendChild(el);
    });

    list.appendChild(group);
  });
}

function changeExpMonth(dir){
  const d = parseMonth(expMonthKey); d.setMonth(d.getMonth()+dir);
  expMonthKey = monthKey(d); renderExpense();
}
function goExpThisMonth(){ expMonthKey = monthKey(new Date()); renderExpense(); }

/* ═══════════ TEMA ═══════════ */
function toggleTheme(){
  const isLight = document.body.classList.toggle('light');
  document.getElementById('themeToggle').textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
}
function applyTheme(){
  const t = localStorage.getItem('theme');
  if(t === 'light'){
    document.body.classList.add('light');
    document.getElementById('themeToggle').textContent = '☀️';
  }
}

/* ═══════════ FLATPICKR ═══════════ */
function initFlatpickr(){
  const opts = { locale: 'uz', dateFormat: 'Y-m-d', disableMobile: true };

  flatpickr('#expDate', { ...opts, defaultDate: 'today' });

  flatpickr('#filterRange', {
    ...opts,
    mode: 'range',
    dateFormat: 'Y-m-d',
    locale: { ...flatpickr.l10ns.uz, rangeSeparator: ' — ' },
    onClose(dates){
      if(dates.length === 2) applyFilter(dateKey(dates[0]), dateKey(dates[1]));
    }
  });
}

/* INIT */
applyTheme();
renderDaily();
// flatpickr ni expense tab ochilganda ham ishlashi uchun kechiktirmasdan init qilamiz
setTimeout(initFlatpickr, 0);
</script>
